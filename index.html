<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فِكر وذِكر</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
        :root {
            --main-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            --container-bg: rgba(255, 255, 255, 0.98);
            --primary-btn: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            --player1-color: linear-gradient(135deg, #2ecc71, #27ae60);
            --player2-color: linear-gradient(135deg, #e67e22, #a35d1e);
            --block-violet: #d199ff; --block-lime: #bfff00; --navy-blue: #1e3799; 
        }
        body { font-family: 'Cairo', sans-serif; background: var(--main-bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; position: relative; }
        
        /* الحاوية الرئيسية */
        #game-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; transition: all 0.5s ease; padding-top: 50px; }

        /* الهيدر الافتراضي (الواجهة الرئيسية): كما تحبينه تماماً */
        #main-header { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px; 
            transition: all 0.5s ease;
        }

        /* التنسيق عند بدء اللعب: العنوان والتاق لاين يميناً، واللوحة يساراً */
        body.in-game-mode #game-wrapper {
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
            height: 100vh;
            padding-top: 0;
            max-width: 1200px;
            margin: 0 auto;
        }

        body.in-game-mode #main-header {
            flex-direction: column; /* التاق لاين تحت العنوان */
            align-items: center;
            margin-bottom: 0;
            transform: scale(0.8); /* تصغير بسيط ليناسب الجانب */
        }

        .title-group { display: flex; flex-direction: column; align-items: center; }
        .billboard-text { color: #1a1a1a; font-size: 5rem; font-weight: 900; margin: 0; line-height: 1; }
        .block-fiker { background: var(--block-violet); padding: 10px 50px; transform: rotate(3deg); box-shadow: 8px 8px 0px rgba(0,0,0,0.2); z-index: 2; }
        .block-thiker { background: var(--block-lime); padding: 10px 60px; transform: rotate(-4deg); box-shadow: 8px 8px 0px rgba(0,0,0,0.2); z-index: 1; margin-top: -15px; margin-right: 30px; }
        
        .side-tagline { 
            background: #fff; 
            padding: 12px 35px; 
            transform: rotate(2deg); 
            box-shadow: 10px 10px 0px var(--navy-blue); 
            border: 4px solid #1a1a1a;
            white-space: nowrap;
        }
        .tagline-text { color: var(--navy-blue); font-size: 1.6rem; font-weight: 900; margin: 0; text-align: center; }

        /* لوحة اللعب: ستكون في اليسار */
        .container { background: var(--container-bg); padding: 30px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); width: 90%; max-width: 780px; border: 5px solid #fff; position: relative; }
        
        .game-layout { display: flex; gap: 25px; align-items: flex-start; }
        .sidebar { flex: 0.7; display: flex; flex-direction: column; gap: 15px; }
        .main-stage { flex: 1.3; position: relative; }
        
        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; width: 100%; position: relative; }
        .cell { aspect-ratio: 1; background: #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 15px rgba(0,0,0,0.05), 0 8px 0 #e0e0e0; position: relative; top: 0; z-index: 2; }
        .cell:active { top: 4px; box-shadow: 0 4px 0 #e0e0e0; }
        .piece { width: 70%; height: 70%; border-radius: 50%; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2); }
        .cell.p1 .piece { background: var(--player1-color); box-shadow: 0 5px 0 #1e8449; }
        .cell.p2 .piece { background: var(--player2-color); box-shadow: 0 5px 0 #874a14; }
        
        #win-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #win-line { stroke: #f1c40f; stroke-width: 14; stroke-linecap: round; filter: drop-shadow(0 0 10px rgba(0,0,0,0.3)); }
        
        .scoreboard { background: var(--navy-blue); padding: 20px; border-radius: 25px; color: white; }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; font-weight: bold; }
        .color-indicator { width: 15px; height: 15px; border-radius: 50%; display: inline-block; margin-left: 8px; border: 2px solid white; }
        .main-btn { background: var(--primary-btn); color: white; border: none; padding: 15px; border-radius: 20px; width: 100%; font-size: 1.2rem; font-weight: 900; cursor: pointer; font-family: 'Cairo'; box-shadow: 0 6px 0 #2980b9; position: relative; }
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .category-btn { background: #f0f0f0; border: none; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
        .category-btn.active { background: #1a1a1a; color: white; transform: scale(1.05); }
        .footer-back-btn { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.4); color: white; padding: 10px 25px; border-radius: 50px; cursor: pointer; z-index: 100; border: none; display: none; font-family: 'Cairo'; }
        .hidden { display: none !important; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .winner-card { background: white; padding: 40px; border-radius: 40px; text-align: center; border: 10px solid var(--block-lime); }
    #question-text {
    word-wrap: break-word; /* لضمان التفاف النصوص الطويلة */
    line-height: 1.4;
}
</style>
</head>
<body id="body-tag">
    <div id="game-wrapper">
        <header id="main-header">
            <div class="title-group">
                <div class="block-fiker"><h1 class="billboard-text">فِكر</h1></div>
                <div class="block-thiker"><h1 class="billboard-text">وذِكر</h1></div>
            </div>
            <div class="side-tagline">
                <p class="tagline-text">إذا كنت قدّها.. أربعة خلّها</p>
            </div>
        </header>
        
        <div class="container" id="setup-screen">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
                <div style="display: flex; gap: 15px; width: 100%;">
                    <input type="text" id="p1-input" placeholder="المنافس الأول" style="flex:1; padding:15px; border:3px solid #eee; border-radius:20px; text-align:center; font-family:'Cairo'; outline: none;">
                    <input type="text" id="p2-input" placeholder="المنافس الثاني" style="flex:1; padding:15px; border:3px solid #eee; border-radius:20px; text-align:center; font-family:'Cairo'; outline: none;">
                </div>
                <div style="width: 100%;">
                    <p style="font-weight:900; color:#333; text-align:center;">اختر ساحة النزال:</p>
                    <div class="category-grid">
                        <button class="category-btn active" onclick="selectCategory('أسئلة دينية')">أسئلة دينية</button>
                        <button class="category-btn" onclick="selectCategory('علم الفضاء')">علم الفضاء</button>
                        <button class="category-btn" onclick="selectCategory('الأحياء')">الأحياء</button>
                        <button class="category-btn" onclick="selectCategory('ثقافة عامة')">ثقافة عامة</button>
                    </div>
                </div>
                <button class="main-btn" onclick="startGame()">ابدأ النزال 🚀</button>
            </div>
        </div>

        <div class="container hidden" id="game-screen">
            <div class="game-layout">
                <div class="sidebar">
                    <div class="scoreboard">
                        <div class="score-row"><span><div class="color-indicator" style="background: #2ecc71;"></div> <span id="p1-display"></span></span><span id="p1-score">0</span></div>
                        <div class="score-row"><span>🤝 تعادل</span> <span id="draw-score">0</span></div>
                        <div class="score-row"><span><div class="color-indicator" style="background: #e67e22;"></div> <span id="p2-display"></span></span><span id="p2-score">0</span></div>
                    </div>
                    <div id="turn-display" style="font-weight:900; text-align:center; padding:12px; background:#ffde59; border-radius:15px; margin: 10px 0; box-shadow: 4px 4px 0px #000;"></div>
                    <div id="post-round-controls" class="hidden">
                        <button class="main-btn" onclick="resetRound()">جولة أخرى</button>
                        <button class="main-btn" style="background:#e74c3c; box-shadow:0 6px 0 #c0392b; margin-top:10px;" onclick="announceFinalWinner()">إنهاء اللعب</button>
                    </div>
                </div>
                <div class="main-stage">
                    <div class="board" id="board"></div>
                    <svg id="win-svg" class="hidden"><line id="win-line" x1="0" y1="0" x2="0" y2="0" /></svg>
                </div>
            </div>
        </div>
    </div>

    <button class="footer-back-btn" id="footer-btn" onclick="location.reload()">🔙 العودة للرئيسية</button>
    <div id="final-modal" class="modal hidden"><div class="winner-card"><h1 id="winner-name" style="font-size: 2rem; color: var(--navy-blue);"></h1><div id="final-stats" style="font-size: 1.2rem; margin: 20px 0; font-weight: bold;"></div><button class="main-btn" onclick="location.reload()">العودة للرئيسية</button></div></div>
    <div id="question-modal" class="modal hidden"><div style="background: white; padding: 35px; border-radius: 40px; width: 90%; max-width: 450px; text-align: center; border: 8px solid var(--block-violet);"><h3 id="question-text" style="font-size: 1.5rem; font-weight: 900; margin-bottom: 20px;"></h3><div id="options-container" style="display: flex; flex-direction: column; gap: 12px;"></div></div></div>
    <script src="script.js"></script>
</body>
</html>
